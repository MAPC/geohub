    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .groupby-btn + .groupby-btn { border-left: none; }
  #groupby-subregion { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
  #groupby-municipality { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
  .groupby-btn[aria-pressed="true"] { background: var(--mapc-navy); border-color: var(--mapc-navy); color: #FFFFFF; }
  .groupby-btn:hover:not([aria-pressed="true"]) { background: #F5F9FD; color: var(--mapc-navy); }
  .groupby-btn:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(31,78,121,0.25); position: relative; z-index: 1; }
  #data-panel-body { flex: 1; min-height: 0; overflow: auto; padding: 14px; }
  #data-panel-body table { border-collapse: separate; border-spacing: 0; font-size: 12px; width: 100%; border: 1px solid var(--card-border); border-radius: var(--radius-sm); overflow: hidden; }
  #data-panel-body th, #data-panel-body td { border-bottom: 1px solid var(--card-border); padding: 6px 10px; text-align: right; }
  #data-panel-body th:first-child, #data-panel-body td:first-child { text-align: left; }
  #data-panel-body th { background: var(--sidebar-bg); font-weight: 700; color: var(--mapc-navy); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  #data-panel-body tr:last-child td { border-bottom: none; }

  /* ---------- Chart widgets (pie / bar) ---------- */
  .chart-title { font-weight: 700; font-size: 13px; color: var(--mapc-navy); margin-bottom: 12px; }
  .chart-empty { font-size: 12.5px; color: var(--text-secondary); text-align: center; padding: 32px 8px; }
  .pie-chart-svg { display: block; width: 100%; max-width: 220px; margin: 0 auto; }
  .chart-legend { margin-top: 14px; font-size: 11.5px; }
  .chart-legend-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
  .chart-legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .bar-chart-wrap { display: flex; flex-direction: column; gap: 5px; }
  .bar-row { display: grid; grid-template-columns: 108px 1fr 64px; align-items: center; gap: 8px; font-size: 11.5px; }
  .bar-row-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-primary); }
  .bar-row-track { background: #F0F1F4; border-radius: 3px; height: 12px; overflow: hidden; }
  .bar-row-fill { height: 100%; border-radius: 3px; background: var(--mapc-navy); min-width: 2px; }
  .bar-row-value { text-align: right; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .bar-row.no-data .bar-row-fill { background: #D9D9D9; }
  .bar-row.no-data .bar-row-value { font-style: italic; }

  @media (max-width: 1024px) {
    #app { flex-direction: column; }
    #controls { width: 100%; min-width: 0; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--card-border); }
    /* Stack the data panel below the map on narrow screens */
    #main { flex-direction: column; }
    #data-panel { width: 100%; flex-shrink: 1; max-height: 40vh; border-left: none; border-top: 1px solid var(--card-border); }
  }
  /* Dockable sidebar, desktop widths only */
  @media (min-width: 1025px) {
    #app { position: relative; }
    #controls {
      position: absolute; left: 0; top: 0; bottom: 0; z-index: 1000;
      transition: transform 0.28s ease; box-shadow: var(--shadow-md);
    }
    #controls-handle {
      display: flex; align-items: center; justify-content: center;
      position: absolute; top: 50%; left: 300px; transform: translateY(-50%);
      width: 22px; height: 56px; background: var(--card-bg); color: var(--mapc-navy);
      border: 1px solid var(--card-border); border-left: none;
      border-radius: 0 var(--radius-md) var(--radius-md) 0; cursor: pointer; z-index: 1001; font-size: 15px;
      transition: left 0.28s ease, background 0.15s ease; box-shadow: var(--shadow-sm);
    }
    #controls-handle:hover { background: #F5F9FD; }
    #handle-icon { display: inline-block; transition: transform 0.28s ease; }
    #app.docked #controls { transform: translateX(-100%); }
    #app.docked #controls-handle { left: 0; }
    #app.docked #handle-icon { transform: rotate(180deg); }
  }
  /* MAPC region outline: dark stroke + drop-shadow reads as a slightly raised edge */
  .region-outline-path {
    filter: drop-shadow(0 3px 2px rgba(0,0,0,0.55)) drop-shadow(0 0 1px rgba(0,0,0,0.8));
  }
</style>
</head>

  numClasses: 5,
  colorRamp: 'mapc-blue',
  basemap: 'carto-light',
  workbook: null,        // parsed SheetJS workbook, kept so switching sheets doesn't need re-upload
  panelView: 'table',    // which tab is active in the data panel: 'table' | 'pie' | 'bar'
  chartGroupBy: 'subregion',  // shared by the Pie and Bar tabs: 'subregion' | 'municipality'
  isolatedClass: null    // legend-click isolation: null | 0..numClasses-1 | 'nodata'
};

let map, choroplethLayer, baseLayer;
const RAMPS = {
  'mapc-blue':  ['#D6E8F7','#93C4DE','#4A97C9','#1F6FB5','#1F4E79'],
  'mapc-green': ['#E8F5E0','#B8DFA3','#88C96D','#6BAA3D','#3D7A1C'],
  'blues':      ['#EFF3FF','#BDD7E7','#6BAED6','#3182BD','#08519C'],
  'greens':     ['#EDF8E9','#BAE4B3','#74C476','#31A354','#006D2C'],
  // Custom Oranges ramp (not stock ColorBrewer), widened for colorblind contrast
  'oranges':    ['#FAF2EB','#E0B285','#B8732E','#623D18','#3D260F'],
  'purples':    ['#F2F0F7','#CBC9E2','#9E9AC8','#756BB1','#54278F'],
  'ylgnbu':     ['#FFFFCC','#A1DAB4','#41B6C4','#2C7FB8','#253494']
};
const NO_DATA_COLOR = '#D9D9D9';
// Free basemap tile sets, no API key required
const BASEMAPS = {
  'carto-light':   { url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', attribution: '&copy; <a href="https://carto.com/attributions">CARTO</a>', subdomains: 'abcd' },
  'carto-voyager': { url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', attribution: '&copy; <a href="https://carto.com/attributions">CARTO</a>', subdomains: 'abcd' },
  'carto-dark':    { url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', attribution: '&copy; <a href="https://carto.com/attributions">CARTO</a>', subdomains: 'abcd' },
  'osm':           { url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', subdomains: 'abc' }
};

// Categorical colors for subregions (ColorBrewer "Paired"), separate from the choropleth ramps above
const SUBREGION_PALETTE = ['#A6CEE3','#1F78B4','#B2DF8A','#33A02C','#FB9A99','#E31A1C','#FDBF6F','#FF7F00','#CAB2D6','#6A3D9A','#FFFF99','#B15928'];

function getMuniList() {
  const seen = new Set(), list = [];
  for (const v of Object.values(MAPC_LOOKUP)) {
    const id = String(v.muniId);
    if (seen.has(id)) continue;
    seen.add(id);
    list.push(v);
  }
  return list;
}
const MUNI_LIST = getMuniList();
const MUNI_BY_ID = {};
MUNI_LIST.forEach(m => { MUNI_BY_ID[String(m.muniId)] = m; });
const ALL_SUBREGIONS = Array.from(new Set(MUNI_LIST.map(m => m.subregion))).sort();
const SUBREGION_COLOR = {};
ALL_SUBREGIONS.forEach((sr, i) => { SUBREGION_COLOR[sr] = SUBREGION_PALETTE[i % SUBREGION_PALETTE.length]; });

// Cap chart entries at this many, grouping the rest into "Other"
const PIE_TOP_N = 8;
const OTHER_SLICE_COLOR = '#B0B0B0';

// Collapses a {label, value} list down to the top N by value plus one summed "Other" entry.
function topNPlusOther(entries, n) {
  const sorted = entries.slice().sort((a, b) => b.value - a.value);
  if (sorted.length <= n) return sorted;
  const top = sorted.slice(0, n);
  const otherTotal = sorted.slice(n).reduce((sum, e) => sum + e.value, 0);
  if (otherTotal > 0) top.push({ label: 'Other (' + (sorted.length - n) + ')', value: otherTotal });
  return top;
}

<script>
function normalizeName(name) {
  return String(name).trim().toLowerCase()
    .replace(/^(town of |city of |the )/, '')
    .replace(/\bmt\.\b/g, 'mount')
    .replace(/\bst\.\b/g, 'saint')
    .replace(/\bn\.\s?/g, 'north ')
    .replace(/\bs\.\s?/g, 'south ')
    .replace(/[^a-z0-9\s-]/g, '')
    .replace(/\s+/g, ' ').trim();
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const d = Array.from({length: m+1}, (_, i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) d[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      d[i][j] = a[i-1] === b[j-1] ? d[i-1][j-1]
        : 1 + Math.min(d[i-1][j], d[i][j-1], d[i-1][j-1]);
    }
  }
  return d[m][n];
}
function levenshteinSimilarity(a, b) {
  const dist = levenshtein(a, b);
  const maxLen = Math.max(a.length, b.length) || 1;
  return 1 - dist / maxLen;
}

function matchMunicipality(rawName) {
  const normalized = normalizeName(rawName);
  if (MAPC_LOOKUP[normalized]) return MAPC_LOOKUP[normalized];
  let best = null, bestScore = 0;
  for (const [key, val] of Object.entries(MAPC_LOOKUP)) {
    const score = levenshteinSimilarity(normalized, key);
    if (score > bestScore && score >= 0.85) { bestScore = score; best = val; }
  }
  return best;
}

function detectMunicipalityColumn(headers, rows) {
  let best = headers[0], bestHits = -1;
  for (const h of headers) {
    let hits = 0;
    for (const r of rows) if (matchMunicipality(r[h])) hits++;
    if (hits > bestHits) { bestHits = hits; best = h; }
  }
  return best;
}

function matchAndRender(rows) {
  const headers = Object.keys(rows[0] || {});
  const townCol = detectMunicipalityColumn(headers, rows);
  const numericCols = headers.filter(h => h !== townCol &&
    rows.some(r => r[h] !== null && r[h] !== '' && !isNaN(parseFloat(r[h]))));

  const unmatched = [];
  for (const r of rows) {
    const m = matchMunicipality(r[townCol]);
    if (m) { r._muniId = String(m.muniId); r._canonical = m.canonical; }
    else { unmatched.push(r[townCol]); }
  }

  state.data = rows;
  state.selectedTowns = new Set(Object.values(MAPC_LOOKUP).map(v => String(v.muniId)));

  showUnmatchedWarning(unmatched);
  populateColumnDropdown(numericCols);
  populateTownFilter();
  state.selectedColumn = numericCols[0] || null;
  document.getElementById('column-select').value = state.selectedColumn;
  renderChoropleth();
}

function showUnmatchedWarning(unmatched) {
  const panel = document.getElementById('warning-panel');
  if (!unmatched.length) { panel.style.display = 'none'; panel.textContent = ''; return; }
  panel.style.display = 'block';
  panel.innerHTML = '<strong>' + unmatched.length + ' unmatched name(s)</strong> — not shown on map: ' +
    unmatched.map(n => String(n)).join(', ');
}
</script>
<script>
function classify(values, method, numClasses) {
  const clean = values.filter(v => v !== null && !isNaN(v));
  if (clean.length === 0) return { breaks: [], getClass: () => -1 };
  if (new Set(clean).size < 2) {
    return { breaks: [clean[0]], getClass: v => (v === null || isNaN(v)) ? -1 : 0 };
  }
  let breaks;
  const n = Math.min(numClasses, new Set(clean).size);
  switch (method) {
    case 'jenks': {
      const clusters = ss.ckmeans(clean, n);
      breaks = clusters.map(c => c[c.length - 1]);
      break;
    }
    case 'quantile': {
      breaks = [];
      for (let i = 1; i <= n; i++) breaks.push(ss.quantile(clean, i / n));
      break;
    }
    case 'equal': {
      const min = Math.min(...clean), max = Math.max(...clean);
      const step = (max - min) / n;
      breaks = Array.from({length: n}, (_, i) => min + step * (i + 1));
      break;
    }
  }
  return {
    breaks,
    getClass(value) {
      if (value === null || isNaN(value)) return -1;
      for (let i = 0; i < breaks.length; i++) if (value <= breaks[i]) return i;
      return breaks.length - 1;
    }
  };
}

function getColorRamp(rampName, numClasses) {
  const base = RAMPS[rampName] || RAMPS['mapc-blue'];
  if (numClasses === base.length) return base;
  const interp = d3.interpolateRgbBasis(base);
  return d3.quantize(interp, numClasses);
}

<script>
const HOME_VIEW = { center: [42.36, -71.06], zoom: 10 };

// Base tiles always render below the choropleth and region outline layers
function setBasemap(key) {
  const def = BASEMAPS[key] || BASEMAPS['carto-light'];
  if (baseLayer) map.removeLayer(baseLayer);
  baseLayer = L.tileLayer(def.url, {
    attribution: def.attribution, subdomains: def.subdomains, maxZoom: 19, crossOrigin: true
  }).addTo(map);
}

function initMap() {
  map = L.map('map', { zoomControl: false }).setView(HOME_VIEW.center, HOME_VIEW.zoom);

  // Added before the zoom/home controls so it stacks above them in the same corner
  const SpatialSearchControl = L.Control.extend({
    // topright, not topleft, since the sidebar overlay covers the topleft corner
    options: { position: 'topright' },
    onAdd: function() {
      const container = L.DomUtil.create('div', 'spatial-search-control');
      container.innerHTML =
        '<div class="spatial-search-box">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>' +
          '<input type="text" id="spatial-search-input" placeholder="Search municipality&hellip;" ' +
            'aria-label="Search and zoom to a municipality" autocomplete="off" role="combobox" ' +
            'aria-expanded="false" aria-controls="spatial-search-results" aria-autocomplete="list">' +
        '</div>' +
        '<ul id="spatial-search-results" class="spatial-search-results" role="listbox" aria-label="Municipality search results"></ul>';
      L.DomEvent.disableClickPropagation(container);
      L.DomEvent.disableScrollPropagation(container);
      return container;
    }
  });
  new SpatialSearchControl().addTo(map);
  initSpatialSearch();

  L.control.zoom({ position: 'topright' }).addTo(map);
  setBasemap(state.basemap);

  const regionOutlineGeoJSON = topojson.feature(REGION_OUTLINE_TOPOJSON, REGION_OUTLINE_TOPOJSON.objects.outline);

  // Backdrop fill for the region, covering tiny native gaps between adjacent town polygons
  L.geoJSON(regionOutlineGeoJSON, {
    interactive: false,
    style: { fill: true, fillColor: '#F5F5F5', fillOpacity: 1, stroke: false }
  }).addTo(map);

  // Dedicated pane so the region outline always stays on top of the choropleth
  map.createPane('regionOutlinePane');
  map.getPane('regionOutlinePane').style.zIndex = 450;
  map.getPane('regionOutlinePane').style.pointerEvents = 'none';

  L.geoJSON(regionOutlineGeoJSON, {
    pane: 'regionOutlinePane',
    interactive: false,
    style: { color: '#1F4E79', weight: 2, opacity: 1, fill: false, className: 'region-outline-path' }
  }).addTo(map);

  const HomeControl = L.Control.extend({
    options: { position: 'topright' },
    onAdd: function() {
      const btn = L.DomUtil.create('button', 'leaflet-bar home-btn');
      btn.innerHTML = '&#8962;';
      btn.title = 'Reset view';
      btn.setAttribute('aria-label', 'Reset map view');
      L.DomEvent.disableClickPropagation(btn);
      L.DomEvent.on(btn, 'click', () => map.setView(HOME_VIEW.center, HOME_VIEW.zoom));
      return btn;
    }
  });
  new HomeControl().addTo(map);

  initLabels();
}

// Zooms to and highlights a searched municipality, as a standalone overlay layer
// (so the highlight survives renderChoropleth() rebuilding the choropleth layer underneath it)
let spotlightLayer = null;
let spotlightTimer = null;

function zoomAndHighlightMuni(muniId) {
  const geojson = topojson.feature(BOUNDARY_TOPOJSON, BOUNDARY_TOPOJSON.objects.municipalities);
  const feature = geojson.features.find(f => String(f.properties.muni_id) === muniId);
  if (!feature) return;

  if (spotlightLayer) { map.removeLayer(spotlightLayer); spotlightLayer = null; }
  clearTimeout(spotlightTimer);

  // White halo plus colored stroke, so the outline is visible against any basemap or fill color
  spotlightLayer = L.layerGroup([
    L.geoJSON(feature, { pane: 'regionOutlinePane', interactive: false,
      style: { color: '#FFFFFF', weight: 7, opacity: 0.9, fill: false } }),
    L.geoJSON(feature, { pane: 'regionOutlinePane', interactive: false,
      style: { color: '#E4572E', weight: 3, opacity: 1, fill: false, className: 'spatial-search-highlight' } })
  ]).addTo(map);

  map.flyToBounds(L.geoJSON(feature).getBounds(), { padding: [48, 48], maxZoom: 13, duration: 0.75 });

  spotlightTimer = setTimeout(() => {
    if (spotlightLayer) { map.removeLayer(spotlightLayer); spotlightLayer = null; }
  }, 4000);
}

function initSpatialSearch() {
  const input = document.getElementById('spatial-search-input');
  const list = document.getElementById('spatial-search-results');
  let matches = [];
  let activeIndex = -1;

  function renderMatches(q) {
    matches = q ? MUNI_LIST
      .filter(m => m.canonical.toLowerCase().includes(q.toLowerCase()))
      .sort((a, b) => a.canonical.localeCompare(b.canonical))
      .slice(0, 8) : [];
    activeIndex = -1;
    list.innerHTML = matches.length
      ? matches.map((m, i) => '<li role="option" id="spatial-search-opt-' + i + '" data-idx="' + i + '">' +
          '<span>' + m.canonical + '</span><span class="spatial-search-subregion">' + m.subregion + '</span></li>').join('')
      : (q ? '<li class="spatial-search-empty">No matching municipality</li>' : '');
    const open = matches.length > 0 || q.length > 0;
    list.classList.toggle('open', open);
    input.setAttribute('aria-expanded', String(open));
  }

  function setActive(idx) {
    activeIndex = idx;
    list.querySelectorAll('li[data-idx]').forEach(li => li.classList.toggle('active', Number(li.dataset.idx) === idx));
    input.setAttribute('aria-activedescendant', idx >= 0 ? 'spatial-search-opt-' + idx : '');
    const activeLi = list.querySelector('li.active');
    if (activeLi) activeLi.scrollIntoView({ block: 'nearest' });
  }

  function pick(m) {
    if (!m) return;
    input.value = m.canonical;
    matches = []; list.innerHTML = ''; list.classList.remove('open'); input.setAttribute('aria-expanded', 'false');
    zoomAndHighlightMuni(String(m.muniId));
  }

  input.addEventListener('input', () => renderMatches(input.value.trim()));

  input.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { if (matches.length) { e.preventDefault(); setActive(Math.min(activeIndex + 1, matches.length - 1)); } }
    else if (e.key === 'ArrowUp') { if (matches.length) { e.preventDefault(); setActive(Math.max(activeIndex - 1, 0)); } }
    else if (e.key === 'Enter') { e.preventDefault(); pick(matches[activeIndex] || matches[0]); }
    else if (e.key === 'Escape') { list.classList.remove('open'); input.setAttribute('aria-expanded', 'false'); input.blur(); }
  });

  list.addEventListener('click', e => {
    const li = e.target.closest('li[data-idx]');
    if (li) pick(matches[Number(li.dataset.idx)]);
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.spatial-search-control')) { list.classList.remove('open'); input.setAttribute('aria-expanded', 'false'); }
  });
}

// Municipality name labels, built once from the boundary geometry
let labelLayer;

function initLabels() {
  const geojson = topojson.feature(BOUNDARY_TOPOJSON, BOUNDARY_TOPOJSON.objects.municipalities);
  labelLayer = L.layerGroup(
    geojson.features.map(feature => L.marker(L.geoJSON(feature).getBounds().getCenter(), {
      icon: L.divIcon({ className: 'town-label', html: feature.properties.NAME, iconSize: null }),
      interactive: false
    }))
  );
}

function formatValue(col, value) {
  if (value === null || isNaN(value)) return 'No Data';
  const isCurrency = /\$|income|cost|price/i.test(col);
  const isPercent = /%|percent/i.test(col) ;
  if (isPercent) return (value * 100).toFixed(1) + '%';
  if (isCurrency) return '$' + Math.round(value).toLocaleString('en-US');
  return Number.isInteger(value) ? value.toLocaleString('en-US') : value.toFixed(2);
}

function renderChoropleth() {
  if (choroplethLayer) { map.removeLayer(choroplethLayer); choroplethLayer = null; }
  const col = state.selectedColumn;
  if (!col) return;

  const values = state.data
    .filter(r => r._muniId && state.selectedTowns.has(r._muniId))
    .map(r => parseFloat(r[col]))
    .filter(v => !isNaN(v));

  const { breaks, getClass } = classify(values, state.classMethod, state.numClasses);
  const colors = getColorRamp(state.colorRamp, breaks.length || state.numClasses);

  // Per-class counts, for the mini histogram behind each legend swatch
  const classCounts = new Array(breaks.length).fill(0);
  values.forEach(v => {
    const idx = getClass(v);
    if (idx >= 0 && idx < classCounts.length) classCounts[idx]++;
  });
  const selectedRowCount = state.data.filter(r => r._muniId && state.selectedTowns.has(r._muniId)).length;
  const noDataCount = selectedRowCount - values.length;

  const geojson = topojson.feature(BOUNDARY_TOPOJSON, BOUNDARY_TOPOJSON.objects.municipalities);

  choroplethLayer = L.geoJSON(geojson, {
    style: function(feature) {
      const muniId = String(feature.properties.muni_id);
      const isSelected = state.selectedTowns.has(muniId);
      if (!isSelected) return { fillColor: '#F0F0F0', fillOpacity: 0.3, weight: 0.5, color: '#CCC' };
      const row = state.data.find(r => r._muniId === muniId);
      const value = row ? parseFloat(row[col]) : null;
      const classIdx = getClass(isNaN(value) ? null : value);
      const fillColor = classIdx === -1 ? NO_DATA_COLOR : colors[classIdx];
      // Isolation is just a display filter — it dims non-matching towns but doesn't
      // change state.selectedTowns, so the classification breaks stay stable.
      const isIsolating = state.isolatedClass !== null;
      const matchesIsolation = state.isolatedClass === 'nodata' ? classIdx === -1 : classIdx === state.isolatedClass;
      if (isIsolating && !matchesIsolation) {
        return { fillColor, fillOpacity: 0.12, weight: 0.5, color: '#FFFFFF', opacity: 0.6 };
      }
      return { fillColor, fillOpacity: 0.85, weight: isIsolating ? 1.5 : 1, color: '#FFFFFF', opacity: 1 };
    },
    onEachFeature: function(feature, layer) {
      const muniId = String(feature.properties.muni_id);
      const row = state.data.find(r => r._muniId === muniId);
      const value = row ? parseFloat(row[col]) : null;
      const lookupEntry = Object.values(MAPC_LOOKUP).find(v => String(v.muniId) === muniId);
      const subregion = lookupEntry ? lookupEntry.subregion : '';
      layer.bindTooltip(
        '<div class="tt-name">' + feature.properties.NAME + '</div>' +
        '<div class="tt-subregion">' + subregion + '</div>' +
        '<div class="tt-value">' + col + ': ' + formatValue(col, isNaN(value) ? null : value) + '</div>',
        { className: 'mapc-tooltip', direction: 'right', offset: [10, 0], sticky: true }
      );
      layer.on({
        mouseover: e => e.target.setStyle({ weight: 2, fillOpacity: 1 }),
        mouseout: e => choroplethLayer.resetStyle(e.target)
      });
    }
  }).addTo(map);

  updateLegend(breaks, colors, col, classCounts, noDataCount);
  updateRampPreview(colors);
  renderDataPanel();
}

// Mirrors the colors currently used on the map/legend, in the swatch strip under the dropdown
function updateRampPreview(colors) {
  document.getElementById('ramp-preview').innerHTML =
    colors.map(c => '<span style="background:' + c + '"></span>').join('');
}

function updateLegend(breaks, colors, col, classCounts, noDataCount) {
  const el = document.getElementById('legend');
  let title = col.length > 30 ? col.slice(0, 27) + '...' : col;
  const isolating = state.isolatedClass !== null;
  let html = '<div class="legend-title-row"><span class="legend-title">' + title + '</span>' +
    (isolating ? '<button type="button" id="legend-clear-isolation" class="legend-clear-btn">Show all</button>' : '') +
    '</div>';
  // One shared scale across every row (including No Data) so histogram bars are comparable
  const maxCount = Math.max(1, ...classCounts, noDataCount || 0);
  const histBar = (count, extraClass) => {
    const pct = (count / maxCount) * 100;
    // Force zero width for an empty class, overriding the CSS min-width floor
    const style = 'width:' + pct + '%' + (count === 0 ? ';min-width:0' : '');
    return '<span class="legend-hist"><span class="legend-hist-bar' + (extraClass ? ' ' + extraClass : '') +
      '" style="' + style + '"></span></span><span class="legend-count">(' + count + ')</span>';
  };
  // Legend rows double as click-to-isolate controls. classIdx is a number for a
  // color class, or the string 'nodata'.
  const legendRow = (classIdx, swatchColor, label, count, histExtraClass) => {
    const active = state.isolatedClass === classIdx;
    return '<div class="legend-row legend-row-clickable" data-class-idx="' + classIdx + '" role="button" tabindex="0" ' +
      'aria-pressed="' + active + '" aria-label="Isolate the ' + count + ' municipalities in this class">' +
      '<span class="legend-swatch" style="background:' + swatchColor + '"></span>' +
      '<span class="legend-label">' + label + '</span>' + histBar(count, histExtraClass) + '</div>';
  };
  let lower = null;
  breaks.forEach((b, i) => {
    const label = lower === null ? '&le; ' + formatValue(col, b) : formatValue(col, lower) + '\u2013' + formatValue(col, b);
    html += legendRow(i, colors[i], label, classCounts[i] || 0);
    lower = b;
  });
  html += '<div class="legend-rule"></div>' + legendRow('nodata', NO_DATA_COLOR, 'No Data', noDataCount || 0, 'no-data-bar');
  el.innerHTML = html;
}

<script>
function populateTownFilter() {
  const container = document.getElementById('town-filter');
  const bySubregion = {};
  for (const [key, v] of Object.entries(MAPC_LOOKUP)) {
    if (key === 'manchester') continue; // alias, skip duplicate row
    (bySubregion[v.subregion] = bySubregion[v.subregion] || []).push(v);
  }
  let html = '';
  for (const region of Object.keys(bySubregion).sort()) {
    const towns = bySubregion[region].sort((a, b) => a.canonical.localeCompare(b.canonical));
    // Starts collapsed by default
    html += '<div class="subregion-group collapsed">' +
      '<div class="subregion-header">' +
        '<label><input type="checkbox" class="region-toggle" checked> ' + region +
          ' <span class="subregion-count">(' + towns.length + ')</span></label>' +
        '<button type="button" class="subregion-toggle-btn" data-region="' + region + '" aria-expanded="false" aria-label="Expand ' + region + '">' +
          '<svg class="chevron-icon" width="10" height="6" viewBox="0 0 10 6" aria-hidden="true"><path d="M1 1l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</button>' +
      '</div><div class="subregion-towns">';
    for (const t of towns) {
      html += '<div class="town-item"><label><input type="checkbox" class="town-toggle" data-muni-id="' + t.muniId + '" checked> ' + t.canonical + '</label></div>';
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
  updateTownCount();
  filterTowns();

  container.querySelectorAll('.town-toggle').forEach(cb => cb.addEventListener('change', () => {
    if (cb.checked) state.selectedTowns.add(cb.dataset.muniId);
    else state.selectedTowns.delete(cb.dataset.muniId);
    updateTownCount();
    renderChoropleth();
  }));
  container.querySelectorAll('.region-toggle').forEach(cb => cb.addEventListener('change', () => {
    const group = cb.closest('.subregion-group');
    group.querySelectorAll('.town-toggle').forEach(t => {
      t.checked = cb.checked;
      if (cb.checked) state.selectedTowns.add(t.dataset.muniId);
      else state.selectedTowns.delete(t.dataset.muniId);
    });
    updateTownCount();
    renderChoropleth();
  }));
  // Separate collapse button, so it doesn't interfere with the region-select label above
  container.querySelectorAll('.subregion-toggle-btn').forEach(btn => btn.addEventListener('click', () => {
    const group = btn.closest('.subregion-group');
    const collapsed = group.classList.toggle('collapsed');
    btn.setAttribute('aria-expanded', String(!collapsed));
    btn.setAttribute('aria-label', (collapsed ? 'Expand ' : 'Collapse ') + btn.dataset.region);
  }));
}

function updateTownCount() {
  document.getElementById('town-count').textContent = state.selectedTowns.size;
}

// Text filter over the town checklist — display-only, doesn't change state.selectedTowns
function filterTowns() {
  const q = document.getElementById('town-search').value.trim().toLowerCase();
  document.querySelectorAll('.subregion-group').forEach(group => {
    let anyVisible = false;
    group.querySelectorAll('.town-item').forEach(item => {
      const match = item.textContent.toLowerCase().includes(q);
      item.style.display = match ? '' : 'none';
      if (match) anyVisible = true;
    });
    group.style.display = anyVisible ? '' : 'none';
    // Auto-expand subregions with a match while searching; collapse again once cleared
    const shouldCollapse = q ? !anyVisible : true;
    group.classList.toggle('collapsed', shouldCollapse);
    const btn = group.querySelector('.subregion-toggle-btn');
    if (btn) {
      btn.setAttribute('aria-expanded', String(!shouldCollapse));
      btn.setAttribute('aria-label', (shouldCollapse ? 'Expand ' : 'Collapse ') + btn.dataset.region);
    }
  });
}
</script>
<script>
// Shows whichever data-panel tab is active; no-op while the panel is closed
function renderDataPanel() {
  const panel = document.getElementById('data-panel');
  if (panel.style.display !== 'flex') return;
  // Group-by control only applies to the chart views, not the table
  document.getElementById('chart-groupby').style.display =
    (state.panelView === 'pie' || state.panelView === 'bar') ? 'flex' : 'none';
  if (state.panelView === 'pie') renderPieChart();
  else if (state.panelView === 'bar') renderBarChart();
  else renderTable();
}

function renderTable() {
  const body = document.getElementById('data-panel-body');
  const col = state.selectedColumn;
  const rows = state.data.filter(r => r._muniId && state.selectedTowns.has(r._muniId)).sort((a, b) => (a._canonical || '').localeCompare(b._canonical || ''));
  let html = '<table><thead><tr><th>Municipality</th><th>' + col + '</th></tr></thead><tbody>';
  for (const r of rows) {
    html += '<tr><td>' + r._canonical + '</td><td>' + formatValue(col, parseFloat(r[col])) + '</td></tr>';
  }
  html += '</tbody></table>';
  body.innerHTML = html;
}

function polarToCartesian(cx, cy, r, angleDeg) {
  const rad = (angleDeg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}
function describeArcPath(cx, cy, r, startAngle, endAngle) {
  const startPt = polarToCartesian(cx, cy, r, startAngle);
  const endPt = polarToCartesian(cx, cy, r, endAngle);
  const largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
  return ['M', cx, cy, 'L', startPt.x, startPt.y, 'A', r, r, 0, largeArc, 1, endPt.x, endPt.y, 'Z'].join(' ');
}

function sumBySubregion(col) {
  const totals = {};
  state.data.forEach(r => {
    if (!r._muniId || !state.selectedTowns.has(r._muniId)) return;
    const v = parseFloat(r[col]);
    if (isNaN(v)) return;
    const muni = MUNI_BY_ID[r._muniId];
    if (!muni) return;
    totals[muni.subregion] = (totals[muni.subregion] || 0) + v;
  });
  return totals;
}

// Builds the {label, value, color}[] list the pie/bar charts render from, grouped by
// subregion or municipality depending on state.chartGroupBy
function computeChartEntries(col) {
  if (state.chartGroupBy === 'municipality') {
    const raw = state.data
      .filter(r => r._muniId && state.selectedTowns.has(r._muniId))
      .map(r => ({ label: r._canonical, value: parseFloat(r[col]) }))
      .filter(e => !isNaN(e.value) && e.value > 0);
    const entries = topNPlusOther(raw, PIE_TOP_N);
    entries.forEach((e, i) => { e.color = e.label.indexOf('Other (') === 0 ? OTHER_SLICE_COLOR : SUBREGION_PALETTE[i % SUBREGION_PALETTE.length]; });
    return { entries, title: col + ' by municipality' };
  }
  const entries = Object.entries(sumBySubregion(col))
    .filter(([, v]) => v > 0)
    .map(([label, value]) => ({ label, value, color: SUBREGION_COLOR[label] || '#999999' }))
    .sort((a, b) => b.value - a.value);
  return { entries, title: col + ' by subregion' };
}

// Renders the pie chart for the currently selected towns and column
function renderPieChart() {
  const body = document.getElementById('data-panel-body');
  const col = state.selectedColumn;
  if (!col) { body.innerHTML = '<div class="chart-empty">Upload data and pick a column to see the chart.</div>'; return; }

  const { entries, title } = computeChartEntries(col);
  const grandTotal = entries.reduce((sum, e) => sum + e.value, 0);

  if (!entries.length || grandTotal <= 0) {
    body.innerHTML = '<div class="chart-title">' + title + '</div>' +
      '<div class="chart-empty">No numeric data for the current selection.</div>';
    return;
  }

  const cx = 110, cy = 110, r = 95;
  let pieMarkup;
  if (entries.length === 1) {
    // A single 100% slice would be a zero-length arc, so draw a plain circle instead
    pieMarkup = '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="' + entries[0].color +
      '" stroke="#FFFFFF" stroke-width="1.5"><title>' + entries[0].label + ': 100%</title></circle>';
  } else {
    let angle = 0;
    pieMarkup = entries.map(e => {
      const startAngle = angle;
      const endAngle = angle + (e.value / grandTotal) * 360;
      angle = endAngle;
      const d = describeArcPath(cx, cy, r, startAngle, endAngle);
      const pct = ((e.value / grandTotal) * 100).toFixed(1);
      return '<path d="' + d + '" fill="' + e.color + '" stroke="#FFFFFF" stroke-width="1.5">' +
        '<title>' + e.label + ': ' + formatValue(col, e.value) + ' (' + pct + '%)</title></path>';
    }).join('');
  }

  const legend = entries.map(e => {
    const pct = ((e.value / grandTotal) * 100).toFixed(1);
    return '<div class="chart-legend-row"><span class="chart-legend-swatch" style="background:' + e.color + '"></span>' +
      '<span>' + e.label + '</span><span style="margin-left:auto;color:var(--text-secondary);">' + pct + '%</span></div>';
  }).join('');

  body.innerHTML =
    '<div class="chart-title">' + title + '</div>' +
    '<svg viewBox="0 0 220 220" class="pie-chart-svg" role="img" aria-label="Pie chart of ' + title + '">' + pieMarkup + '</svg>' +
    '<div class="chart-legend">' + legend + '</div>';
}

// Renders the bar chart: municipalities alphabetically, or subregions ranked by total.
// Missing values show a "No Data" row instead of a zero-length bar.
function renderBarChart() {
  const body = document.getElementById('data-panel-body');
  const col = state.selectedColumn;
  if (!col) { body.innerHTML = '<div class="chart-empty">Upload data and pick a column to see the chart.</div>'; return; }

  let rows, title;
  if (state.chartGroupBy === 'subregion') {
    rows = Object.entries(sumBySubregion(col)).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
    title = col + ' by subregion';
  } else {
    rows = state.data
      .filter(r => r._muniId && state.selectedTowns.has(r._muniId))
      .map(r => ({ name: r._canonical, value: parseFloat(r[col]) }))
      .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    title = col;
  }

  if (!rows.length) {
    body.innerHTML = '<div class="chart-title">' + title + '</div><div class="chart-empty">No municipalities selected.</div>';
    return;
  }

  const maxVal = Math.max(0, ...rows.filter(row => !isNaN(row.value)).map(row => row.value));

  const barRows = rows.map(row => {
    const isNoData = isNaN(row.value);
    const widthPct = (!isNoData && maxVal > 0) ? Math.max((row.value / maxVal) * 100, row.value > 0 ? 1.5 : 0) : 0;
    return '<div class="bar-row' + (isNoData ? ' no-data' : '') + '">' +
      '<div class="bar-row-label" title="' + row.name + '">' + row.name + '</div>' +
      '<div class="bar-row-track"><div class="bar-row-fill" style="width:' + widthPct + '%"></div></div>' +
      '<div class="bar-row-value">' + (isNoData ? 'No Data' : formatValue(col, row.value)) + '</div>' +
      '</div>';
  }).join('');

  body.innerHTML = '<div class="chart-title">' + title + '</div><div class="bar-chart-wrap">' + barRows + '</div>';
}
</script>
<script>
// UI wiring: dropdown population, all event listeners, docking, file upload/parsing.
function populateColumnDropdown(columns) {
  const sel = document.getElementById('column-select');
  sel.innerHTML = columns.map(c => '<option value="' + c + '">' + c + '</option>').join('');
}

function bindControls() {
  document.getElementById('sheet-select').addEventListener('change', e => {
    loadSheet(e.target.value);
  });
  document.getElementById('column-select').addEventListener('change', e => {
    // Drop isolation, since it doesn't apply to the new column's breaks
    state.selectedColumn = e.target.value; state.isolatedClass = null; renderChoropleth();
  });
  document.getElementById('method-select').addEventListener('change', e => {
    state.classMethod = e.target.value; state.isolatedClass = null; renderChoropleth();
  });
  document.querySelectorAll('.classes-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.classes-btn').forEach(b => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
      state.numClasses = parseInt(btn.dataset.classes, 10); state.isolatedClass = null; renderChoropleth();
    });
  });
  document.getElementById('ramp-select').addEventListener('change', e => {
    state.colorRamp = e.target.value; renderChoropleth();
  });
  document.getElementById('basemap-select').addEventListener('change', e => {
    state.basemap = e.target.value; setBasemap(state.basemap);
  });
  document.getElementById('select-all').addEventListener('click', () => {
    document.querySelectorAll('.town-toggle, .region-toggle').forEach(cb => cb.checked = true);
    state.selectedTowns = new Set(Object.values(MAPC_LOOKUP).map(v => String(v.muniId)));
    updateTownCount(); renderChoropleth();
  });
  document.getElementById('deselect-all').addEventListener('click', () => {
    document.querySelectorAll('.town-toggle, .region-toggle').forEach(cb => cb.checked = false);
    state.selectedTowns = new Set();
    updateTownCount(); renderChoropleth();
  });
  document.getElementById('town-search').addEventListener('input', filterTowns);
  document.getElementById('label-toggle').addEventListener('change', e => {
    if (e.target.checked) labelLayer.addTo(map);
    else map.removeLayer(labelLayer);
  });
  document.getElementById('panel-toggle').addEventListener('change', e => {
    document.getElementById('data-panel').style.display = e.target.checked ? 'flex' : 'none';
    renderDataPanel();
    // Tell Leaflet to resize, since it doesn't detect container resizes on its own
    map.invalidateSize();
  });
  document.querySelectorAll('.panel-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.panel-tab').forEach(b => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
      state.panelView = btn.dataset.view;
      renderDataPanel();
    });
  });
  document.querySelectorAll('.groupby-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.groupby-btn').forEach(b => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
      state.chartGroupBy = btn.dataset.group;
      renderDataPanel();
    });
  });

  const fileInput = document.getElementById('file-input');
  const uploadZone = document.getElementById('upload-zone');
  uploadZone.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
  });
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFileUpload(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => { if (e.target.files.length) handleFileUpload(e.target.files[0]); });

  document.getElementById('export-png').addEventListener('click', exportPNG);
  document.getElementById('export-pdf').addEventListener('click', exportPDF);

  // Delegate from the static #legend container, since its contents are replaced on every render
  const legendEl = document.getElementById('legend');
  legendEl.addEventListener('click', e => {
    if (e.target.closest('#legend-clear-isolation')) { state.isolatedClass = null; renderChoropleth(); return; }
    const row = e.target.closest('.legend-row-clickable');
    if (row) toggleIsolation(row.dataset.classIdx);
  });
  legendEl.addEventListener('keydown', e => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const row = e.target.closest('.legend-row-clickable');
    if (row) { e.preventDefault(); toggleIsolation(row.dataset.classIdx); }
  });

  bindDocking();
}

// Toggles legend-click isolation. rawIdx is 'nodata' or a stringified class number.
function toggleIsolation(rawIdx) {
  const idx = rawIdx === 'nodata' ? 'nodata' : parseInt(rawIdx, 10);
  state.isolatedClass = (state.isolatedClass === idx) ? null : idx;
  renderChoropleth();
}

// Burger handle toggles the control panel open/closed (desktop only — see CSS media query)
function bindDocking() {
  const appEl = document.getElementById('app');
  const handleEl = document.getElementById('controls-handle');
  handleEl.addEventListener('click', () => appEl.classList.toggle('docked'));
}

function handleFileUpload(file) {
  const name = file.name.toLowerCase();
  if (!name.endsWith('.xlsx') && !name.endsWith('.xls') && !name.endsWith('.csv')) {
    alert('Please upload an .xlsx or .csv file'); return;
  }
  if (file.size > 10 * 1024 * 1024) { alert('File exceeds 10MB limit'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: 'array' });
    state.workbook = workbook;
    document.getElementById('upload-status').textContent = 'Loaded: ' + file.name;

    const sheetGroup = document.getElementById('sheet-group');
    const sheetSelect = document.getElementById('sheet-select');
    sheetSelect.innerHTML = workbook.SheetNames.map(n => '<option value="' + n + '">' + n + '</option>').join('');
    sheetGroup.style.display = workbook.SheetNames.length > 1 ? 'block' : 'none';

    loadSheet(workbook.SheetNames[0]);
  };
  reader.readAsArrayBuffer(file);
}

function loadSheet(sheetName) {
  const sheet = state.workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { defval: null });
  if (!rows.length) { alert('The "' + sheetName + '" sheet appears to be empty'); return; }
  matchAndRender(rows);
}

</script>
<script>
// Swaps each map tile to a base64 data URI during export, so cross-origin basemap tiles
// don't break the capture, then restores the original tile URLs afterward.
async function withInlinedTiles(captureFn) {
  const imgs = Array.from(document.querySelectorAll('#map .leaflet-tile-pane img'));
  const originalSrcs = imgs.map(img => img.src);
  await Promise.all(imgs.map(async (img, i) => {
    try {
      const resp = await fetch(originalSrcs[i], { mode: 'cors' });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const blob = await resp.blob();
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
      await new Promise(resolve => {
        img.onload = () => { img.style.opacity = '1'; resolve(); };
        img.onerror = resolve; // don't let one bad tile hang the whole export
        img.src = dataUrl;
      });
    } catch (e) { /* leave this tile as-is if it can't be fetched */ }
  }));
  try {
    return await captureFn();
  } finally {
    imgs.forEach((img, i) => { img.src = originalSrcs[i]; img.style.opacity = ''; });
  }
}

// Captures the map (labels and polygons together) at full extent, regardless of sidebar state
function captureMain() {
  const el = document.getElementById('main');
  return withInlinedTiles(() => html2canvas(el, {
    scale: 2, useCORS: true, foreignObjectRendering: true,
    width: el.clientWidth, height: el.clientHeight, x: 0, y: 0
  }));
}

function exportPNG() {
  captureMain().then(canvas => {
    const link = document.createElement('a');
    const col = (state.selectedColumn || 'map').replace(/[^a-z0-9]+/gi, '_');
    link.download = 'MAPC_Choropleth_' + col + '_' + new Date().toISOString().slice(0, 10) + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(() => alert('Export failed. Try reducing the map zoom level.'));
}

function exportPDF() {
  captureMain().then(canvas => {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'in', format: 'letter' });
    const imgData = canvas.toDataURL('image/png');
    const pageW = 11, pageH = 8.5;
    const ratio = Math.min((pageW - 1) / canvas.width, (pageH - 1.5) / canvas.height);
    const w = canvas.width * ratio, h = canvas.height * ratio;
    pdf.setFontSize(14);
    pdf.text(state.selectedColumn || '', 0.5, 0.5);
    pdf.setFontSize(9);
    pdf.text('Generated ' + new Date().toISOString().slice(0, 10), 0.5, 0.75);
    pdf.addImage(imgData, 'PNG', (pageW - w) / 2, 0.9, w, h);
    pdf.setFontSize(8);
    pdf.text('Boundaries: Metropolitan Area Planning Council | Data: user upload | Map: MAPC', 0.5, pageH - 0.3);
    const col = (state.selectedColumn || 'map').replace(/[^a-z0-9]+/gi, '_');
    pdf.save('MAPC_Choropleth_' + col + '_' + new Date().toISOString().slice(0, 10) + '.pdf');
  }).catch(() => alert('Export failed. Try reducing the map zoom level.'));
}

</script>

initMap();
bindControls();
matchAndRender(SAMPLE_DATA);
</script>
